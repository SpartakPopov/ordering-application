version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Pre-build started

  build:
    commands:
      - echo Build started
      - mvn clean package -DskipTests
      - echo Build completed

  post_build:
    commands:
      - echo Post-build completed

artifacts:
  files:
    - target/ordering-app-0.0.1-SNAPSHOT.jar
    - Procfile
  discard-paths: yes

cache:
  paths:
    - /root/.m2/**/*
