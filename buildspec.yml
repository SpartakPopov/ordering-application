version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 741429964604.dkr.ecr.eu-north-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - mvn clean package -DskipTests
      - docker build -t ordering-app .
      - docker tag ordering-app:latest 741429964604.dkr.ecr.eu-north-1.amazonaws.com/ordering-app:latest

  post_build:
    commands:
      - echo Pushing image to ECR
      - docker push 741429964604.dkr.ecr.eu-north-1.amazonaws.com/ordering-app:latest
      - echo Writing Dockerrun.aws.json
      - printf '{"AWSEBDockerrunVersion":"1","Image":{"Name":"741429964604.dkr.ecr.eu-north-1.amazonaws.com/ordering-app:latest","Update":"true"},"Ports":[{"ContainerPort":5000}]}' > Dockerrun.aws.json

artifacts:
  files:
    - Dockerrun.aws.json
  discard-paths: yes

cache:
  paths:
    - /root/.m2/**/*