# ── Database — use H2 in-memory instead of MySQL so tests run without a real DB ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── JWT — test secret (must be at least 32 bytes / 256 bits for HS256) ──────────
app.jwt-secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
app.jwt-expiration-ms=3600000

# ── Default account passwords seeded on startup ──────────────────────────────────
app.default-manager-password=TestPass123
app.default-kitchen-password=TestPass123

# ── Stripe — placeholders so PaymentController @PostConstruct does not fail ───────
stripe.secret-key=sk_test_placeholder
stripe.webhook-secret=whsec_placeholder
stripe.publishable-key=pk_test_placeholder